<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Wireframe</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; }
        h1 { color: #333; }
        .screen { border: 1px solid #ccc; padding: 20px; margin: 10px; width: 300px; }
        .button { background-color: #007BFF; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Wireframe</h1>
        <div class="screen">
            <h2>Landing Page</h2>
            <button class="button">Get Started</button>
        </div>
        <div class="screen">
            <h2>Screenwriter Dashboard</h2>
            <button class="button">View Scripts</button>
        </div>
        <div class="screen">
            <h2>Producer Dashboard</h2>
            <button class="button">View Projects</button>
        </div>
        <div class="screen">
            <h2>Project Details</h2>
            <button class="button">Edit Project</button>
        </div>
        <div class="screen">
            <h2>Messaging Interface</h2>
            <button class="button">Send Message</button>
        </div>
    </div>
</body>
</html>
